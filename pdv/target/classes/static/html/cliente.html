<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
</head>
<body>

        <button onclick="buscarTodosClientes()">Todos</button>

        <input type="number" placeholder="id" id="idbuscarcliente">

        <input type="text" placeholder="nome" id="nomebuscarcliente">
        <button onclick="buscarClientesNome()">buscar</button>

        <input type="text" placeholder="nome" id="nomeinserircliente">

        <input type="number" placeholder="ID" id="ideditarcliente">
        <input type="text" placeholder="nome" id="nomeeditarcliente">
        <input type="text" placeholder="telefone" id="telefoneeditarcliente">
        <input type="text" placeholder="cpf" id="cpfeditarcliente">
        <button onclick="atualizarCliente()">atualizar</button>

    <script src="../js/cliente.js"></script>
