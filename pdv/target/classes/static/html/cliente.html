<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="buscarTodosClientes()">
    <header>
        <h1>Sales Manager</h1>
    </header>
    <nav>
        <a href="pedido.html">Pedidos</a>
        <a href="produto.html">Produtos</a>
        <a href="cliente.html">Clientes</a>
    </nav>

    <main>
        <div class="container">
            <div>
                <h3>Cadastro</h3>
                <input type="text" placeholder="Nome" id="nomeinserircliente">
                <input type="text" placeholder="Telefone" id="telefoneinserircliente">
                <input type="text" placeholder="CPF" id="cpfinserircliente">
                <button onclick="inserirCliente()">Cadastrar</button>
            </div>
            <div>
                <h3>Edição</h3>
                <input type="number" placeholder="ID" id="ideditarcliente">
                <input type="text" placeholder="Novo nome" id="nomeeditarcliente">
                <input type="text" placeholder="Novo telefone" id="telefoneeditarcliente">
                <!-- <input type="text" placeholder="cpf" id="cpfeditarcliente"> -->
                <button onclick="atualizarCliente()">Editar</button>
            </div>
        </div>

        <input type="text" placeholder="Buscar" id="idbuscarcliente">
        <button onclick="buscarClientes()">Buscar</button>

        <div class="table-clientes" id="tabelaClientes"></div>
    </main>
    <script src="../js/cliente.js"></script>
</body>
</html>
