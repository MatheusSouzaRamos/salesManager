<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="buscarTodosProdutos()">
    <header>
        <h1>Sales Manager</h1>
    </header>
    <nav>
        <a href="pedido.html">Pedidos</a>
        <a href="produto.html">Produtos</a>
        <a href="cliente.html">Clientes</a>
    </nav>
        
    <main>

        <div class="container">
            <div>
                <h3 style="margin-bottom: 35px;">Cadastro</h3>
                <input type="text" placeholder="Nome" id="nomeinserirproduto">
                <input type="number" placeholder="Valor" id="valorinserirproduto" min="0">
                <button onclick="inserirProduto()">Cadastrar</button>
            </div>
            <div>
                <h3>Edição</h3>
                <input type="number" placeholder="ID" id="ideditarproduto">
                <input type="text" placeholder="Novo nome" id="nomeeditarproduto">
                <input type="number" placeholder="Novo valor" id="valoreditarproduto" min="0">
                <button onclick="atualizarProduto()">Editar</button>
            </div>
        </div>

        <div class="busca">
            <input type="text" placeholder="Buscar" id="idbuscarproduto">
            <button onclick="buscarProduto()">Buscar</button>
        </div>


        <div class="table-produtos" id="tabelaProdutos"></div>
    </main>
    
    <script src="../js/produto.js"></script>
</body>
</html>
