<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Sales Manager</h1>
    </header>
    <nav>
        <a href="pedido.html">Pedidos</a>
        <a href="produto.html">Produtos</a>
        <a href="cliente.html">Clientes</a>
    </nav>
        
    <main>
        <button onclick="buscarTodosProdutos()">Todos</button>
        <br>
        <input type="number" placeholder="id" id="idbuscarproduto">
        <button onclick="buscarProdutoId()">id</button>
        <br>
        <input type="text" placeholder="nome" id="nomebuscarproduto">
        <button onclick="buscarProdutoNome()">buscar</button>



        <div class="container">

            <div>
                <h3 style="margin-bottom: 35px;">Cadastro</h3>
                <input type="text" placeholder="Nome" id="nomeinserirproduto">
                <input type="number" placeholder="Valor" id="valorinserirproduto">
                <button onclick="inserirProduto()">Cadastrar</button>
            </div>

            <div>
                <h3>Edição</h3>
                <input type="number" placeholder="ID" id="ideditarproduto">
                <input type="text" placeholder="Novo nome" id="nomeeditarproduto">
                <input type="number" placeholder="Novo  valor" id="valoreditarproduto">
                <button onclick="atualizarProduto()">Editar</button>
            </div>
        </div>
    </main>
    
    <script src="../js/produto.js"></script>
</body>
</html>
